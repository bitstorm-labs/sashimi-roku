# Sashimi Roku CI
#
# Stages:
#   test  — brighterscript lint
#   build — bsc build + zip; publishes the packaged channel as an artifact
#
# No deploy stage: Roku channels are sideloaded for development with
# `roku-deploy` (locally, using ROKU_DEV_TARGET/ROKU_DEV_PASSWORD env vars),
# and published to the Channel Store through Roku's web dashboard.

stages:
  - test
  - build

variables:
  NODE_IMAGE: node:20-bookworm-slim

default:
  tags:
    - bitworx
  image: $NODE_IMAGE

.node:
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  before_script:
    - npm ci
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:
  extends: .node
  stage: test
  script:
    - npm run lint

build:
  extends: .node
  stage: build
  script:
    - npm run build
    - npm run package
  artifacts:
    name: sashimi-roku-$CI_COMMIT_SHORT_SHA
    paths:
      - sashimi.zip
    expire_in: 30 days
